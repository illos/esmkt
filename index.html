<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Esmeralda Market · Fish Lake Valley, NV</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/base.css"/>
<link rel="stylesheet" href="css/index.css"/>
</head>
<body class="topo">

<!-- ─── STICKY NAV ─── -->
<nav class="site-nav">
  <div class="nav-left">
    <span class="store-status" id="storeStatus">...</span>
  </div>
  <a href="index.html" class="nav-logo">
    <img src="assets/emskt-logo-inline.webp" alt="Esmeralda Market" class="nav-logo-img"/>
  </a>
  <div class="nav-right">
    <button class="nav-hamburger" id="navHamburger" aria-label="Open menu" onclick="toggleNavOverlay()">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

<!-- ─── NAV OVERLAY ─── -->
<div class="nav-overlay" id="navOverlay" aria-hidden="true">
  <div class="nav-overlay-backdrop" onclick="closeNavOverlay()"></div>
  <div class="nav-overlay-panel">
    <div class="nav-overlay-header">
      <span class="nav-overlay-title">Links</span>
      <button class="nav-overlay-close" onclick="closeNavOverlay()" aria-label="Close menu">&#215;</button>
    </div>
    <nav id="navOverlayLinks"></nav>
  </div>
</div>

<!-- ─── PAGE SECTIONS ───
     Populated by js/index.js after it fetches /api/pages/home and /api/settings.
     See js/sections.js for the type registry and render functions. -->
<main id="sections"></main>

<!-- ─── FOOTER ─── -->
<footer class="site-footer global-footer topo">
  <div class="gf-inner">

    <!-- Col 1: Brand + Contact -->
    <div class="gf-brand">
      <a href="index.html" class="gf-logo-link">
        <img src="assets/esmeralda-logo.webp" alt="Esmeralda Market" class="gf-logo gf-logo--full"/>
      </a>
      <div class="gf-contact">
        <a href="tel:7755723200" class="gf-contact-item" id="footerPhone">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6.62 10.79a15.05 15.05 0 006.59 6.59l2.2-2.2a1 1 0 011.01-.24 11.47 11.47 0 003.58.57 1 1 0 011 1V21a1 1 0 01-1 1A17 17 0 013 5a1 1 0 011-1h3.5a1 1 0 011 1c0 1.25.2 2.45.57 3.58a1 1 0 01-.25 1.01z"/></svg>
          775-572-3200
        </a>
        <a href="https://maps.app.goo.gl/dhU5oMRYwXpTUhmY9" target="_blank" rel="noopener noreferrer" class="gf-contact-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
          HWY 264, Mile Marker 8 &middot; Dyer, NV 89010
        </a>
        <a href="admin.html" class="gf-contact-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/><path d="M18 14l2 2 4-4" stroke-width="1.5"/></svg>
          Admin
        </a>
      </div>
    </div>

    <!-- Col 2: Links -->
    <!-- Links — dynamically populated by renderLinks() in index.js -->
    <div class="gf-links">
      <div class="gf-col-label">Links</div>
      <div id="footerQuickLinks"></div>
    </div>

    <!-- Col 3: Combined hours card -->
    <div class="gf-hours">
      <div class="gf-col-label">Business Hours</div>
      <div class="hours-card gf-hours-combined topo-light">
        <div class="gf-hours-row">
          <span class="gf-hours-label">Market</span>
          <span class="gf-hours-right">
            <span class="hours-time" id="footerStoreHoursTime">8:30 AM &ndash; 7:30 PM</span>
            <span class="hours-days" id="footerStoreHoursDays">Every Day</span>
            <div class="hours-schedule" id="footerStoreHoursSchedule" style="display:none"></div>
          </span>
        </div>
        <div class="gf-hours-divider"></div>
        <div class="gf-hours-row">
          <span class="gf-hours-label">Snackbar</span>
          <span class="gf-hours-right">
            <span class="hours-time" id="footerSnackbarHoursTime">9:00 AM &ndash; 3:00 PM</span>
            <span class="hours-days" id="footerSnackbarHoursDays">Mon &ndash; Sat</span>
            <div class="hours-schedule" id="footerSnackbarHoursSchedule" style="display:none"></div>
          </span>
        </div>
      </div>
    </div>

  </div>
  <div class="gf-bottom">
    <span>&copy; <span id="footerYear"></span> Esmeralda Market &middot; Fish Lake Valley, NV</span>
    <span class="gf-bottom-right">HWY 264 MM8 &middot; Dyer, NV 89010</span>
  </div>
</footer>

<script src="js/nav.js"></script>
<script src="js/sections.js"></script>
<script src="js/index.js"></script>
</body>
</html>
